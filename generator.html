<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор постов — Контент-менеджер риэлтора</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <img src="assets/images/profile.png" alt="Профиль" class="logo-icon">
        <span class="logo-text">Контент<span>-менеджер</span></span>
      </a>
      <button class="menu-toggle" aria-label="Меню">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Главная</a></li>
        <li><a href="generator.html" class="active">Генератор</a></li>
        <li><a href="carousel.html">Карусель</a></li>
        <li><a href="templates.html">Шаблоны</a></li>
        <li><a href="gallery.html">Фото</a></li>
        <li><a href="calendar.html">Календарь</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="section-header">
      <h2>✨ Генератор постов</h2>
      <p>Выберите тип контента, заполните поля — получите готовый текст для публикации</p>
      <hr class="gold-line">
    </div>

    <div class="generator-layout">
      <div class="panel">
        <h3 class="panel-title">Настройки поста</h3>

        <div class="form-group">
          <label>Тип контента</label>
          <div class="post-types">
            <button class="post-type-btn" data-type="property">🏠 Объект</button>
            <button class="post-type-btn" data-type="tips">💡 Совет</button>
            <button class="post-type-btn" data-type="personal">👤 Бренд</button>
            <button class="post-type-btn" data-type="story">📖 История</button>
            <button class="post-type-btn" data-type="market">📊 Рынок</button>
            <button class="post-type-btn" data-type="reels">🎬 Reels</button>
            <button class="post-type-btn" data-type="mortgage">🏦 Ипотека</button>
            <button class="post-type-btn" data-type="checklist">✅ Чек-лист</button>
          </div>
        </div>

        <div class="form-group">
          <label for="platform">Платформа</label>
          <select id="platform">
            <option value="instagram">Instagram</option>
            <option value="vk">ВКонтакте</option>
            <option value="telegram">Telegram</option>
          </select>
        </div>

        <div id="form-fields"></div>

        <button id="generate-btn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">🔄 Обновить текст</button>
      </div>

      <div class="panel">
        <h3 class="panel-title">Готовый пост</h3>
        <div id="output" class="output-box"></div>
        <div id="hashtags" class="hashtags-box"></div>
        <div class="output-actions">
          <button id="copy-btn" class="btn btn-secondary">📋 Копировать текст</button>
          <button id="copy-all-btn" class="btn btn-primary">📋 Текст + хештеги</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <hr class="gold-line">
    <p>Контент-менеджер риэлтора © 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
