<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Шаблоны — Контент-менеджер риэлтора</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <img src="assets/images/profile.png" alt="Профиль" class="logo-icon">
        <span class="logo-text">Контент<span>-менеджер</span></span>
      </a>
      <button class="menu-toggle" aria-label="Меню">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Главная</a></li>
        <li><a href="generator.html">Генератор</a></li>
        <li><a href="templates.html" class="active">Шаблоны</a></li>
        <li><a href="gallery.html">Фото</a></li>
        <li><a href="calendar.html">Календарь</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="section-header">
      <h2>📋 Библиотека шаблонов</h2>
      <p>Готовые тексты для быстрой публикации — копируйте и адаптируйте под себя</p>
      <hr class="gold-line">
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">Все</button>
      <button class="filter-tab" data-filter="property">Объекты</button>
      <button class="filter-tab" data-filter="tips">Советы</button>
      <button class="filter-tab" data-filter="personal">Бренд</button>
      <button class="filter-tab" data-filter="story">Истории</button>
      <button class="filter-tab" data-filter="market">Рынок</button>
      <button class="filter-tab" data-filter="reels">Reels</button>
      <button class="filter-tab" data-filter="mortgage">Ипотека</button>
      <button class="filter-tab" data-filter="checklist">Чек-листы</button>
    </div>

    <div id="templates-grid" class="templates-grid"></div>
  </div>

  <footer class="footer">
    <hr class="gold-line">
    <p>Контент-менеджер риэлтора © 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
